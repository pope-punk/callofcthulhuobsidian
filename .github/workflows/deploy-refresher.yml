name: Deploy refresher site to Pages

on:
  push:
    branches:
      - main
      - claude/campaign-refresher-packet-FSQPV
    paths:
      - refresher-site/**
      - .github/workflows/deploy-refresher.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: refresher-site
      - id: deployment
        uses: actions/deploy-pages@v4
